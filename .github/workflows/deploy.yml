name: CD Deploy to AWS
 
on:
  push:
    branches: [beta]
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to deploy"
        required: true
        type: choice
        options:
          - ml-apis
          - blueweave-backend
          - blueweave-frontend
          - python-agents
          - all
      restart:
        description: "Restart service after deployment"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: cd-deploy-beta
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js (frontend artifact build)
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'blueweave-frontend' || github.event.inputs.service == 'all' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend artifact on runner
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'blueweave-frontend' || github.event.inputs.service == 'all' }}
        run: |
          cd "Strong Seaweed/blue-weave-aqua-main"
          if [[ -f package-lock.json ]]; then
            npm ci || npm install --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi
          npm run build
          test -f dist/index.html
          tar -czf "$RUNNER_TEMP/blueweave-dist.tgz" -C . dist

      - name: Setup SSH key
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${AWS_HOST:-}" ]]; then
            echo "::error::Missing GitHub secret AWS_HOST"
            exit 1
          fi
          if [[ -z "${AWS_USER:-}" ]]; then
            echo "::error::Missing GitHub secret AWS_USER"
            exit 1
          fi
          if [[ -z "${AWS_SSH_KEY:-}" ]]; then
            echo "::error::Missing GitHub secret AWS_SSH_KEY"
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          # Normalize potential CRLF line endings from copied secrets.
          printf '%s\n' "$AWS_SSH_KEY" | tr -d '\r' > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

          # Validate key format early so failures are explicit.
          ssh-keygen -l -f "$HOME/.ssh/deploy_key" >/dev/null 2>&1 || {
            echo "::error::AWS_SSH_KEY is not a valid private key"
            exit 1
          }

          ssh-keyscan -T 15 -H "$AWS_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null || {
            echo "::error::Unable to reach AWS_HOST with ssh-keyscan: ${AWS_HOST}"
            exit 1
          }
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Upload frontend artifact to server
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'blueweave-frontend' || github.event.inputs.service == 'all' }}
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
        run: |
          echo "Uploading frontend artifact to ${AWS_USER}@${AWS_HOST}:/tmp/blueweave-dist.tgz"
          scp -i ~/.ssh/deploy_key "$RUNNER_TEMP/blueweave-dist.tgz" "${AWS_USER}@${AWS_HOST}:/tmp/blueweave-dist.tgz"
          ssh -i ~/.ssh/deploy_key "${AWS_USER}@${AWS_HOST}" "ls -lh /tmp/blueweave-dist.tgz"

      - name: Deploy code to AWS
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          MODEL_API_ENV_B64: ${{ secrets.MODEL_API_ENV_B64 }}
          SERVICE: ${{ (github.event_name == 'push' && 'all') || github.event.inputs.service || 'all' }}
        run: |
          ssh -i ~/.ssh/deploy_key "${AWS_USER}@${AWS_HOST}" "DEPLOY_PATH='${DEPLOY_PATH}' SERVICE='${SERVICE}' MONGODB_URI='${MONGODB_URI}' JWT_SECRET='${JWT_SECRET}' CORS_ORIGINS='${CORS_ORIGINS}' MODEL_API_ENV_B64='${MODEL_API_ENV_B64}' bash -s" << 'EOF'
            set -euo pipefail
            DEPLOY_ROOT="${DEPLOY_PATH:-}"
            if [[ -z "${DEPLOY_ROOT}" || ! -d "${DEPLOY_ROOT}" ]]; then
              for c in \
                "${HOME}/strongseaweed" \
                "${HOME}/Strong Seaweed/Strong Seaweed" \
                "${HOME}/Strong-Seaweed" \
                "${HOME}/Strong Seaweed"; do
                if [[ -d "${c}" ]]; then
                  DEPLOY_ROOT="${c}"
                  break
                fi
              done
            fi
            if [[ -z "${DEPLOY_ROOT}" || ! -d "${DEPLOY_ROOT}" ]]; then
              echo "Could not resolve deployment root. DEPLOY_PATH='${DEPLOY_PATH}'"
              exit 1
            fi

            cd "${DEPLOY_ROOT}"
            echo "Using deployment root: ${DEPLOY_ROOT}"

            echo "Pulling latest code from beta branch..."
            git fetch origin beta
            git checkout beta || git checkout -b beta origin/beta
            git reset --hard origin/beta

            if [[ "${SERVICE}" == "ml-apis" || "${SERVICE}" == "all" ]]; then
              echo "Setting up ML backend Python environment..."
              cd "Strong Seaweed/Strong-Seaweed-main"
              echo "Disk usage before ML setup:"
              df -h || true
              rm -rf ~/.cache/pip ~/.cache/pip-tools ~/.npm || true
              sudo apt-get clean || true
              sudo journalctl --vacuum-size=100M || true
              sudo apt-get update -y
              sudo apt-get install -y libgomp1
              if ! python3 -m venv .venv_model_api; then
                echo "python3-venv missing; installing prerequisites..."
                sudo apt-get update -y
                sudo apt-get install -y python3-venv python3-pip python3.12-venv || true
                python3 -m venv .venv_model_api
              fi
              source .venv_model_api/bin/activate
              python -m pip install --upgrade pip --no-cache-dir
              if ! python -m pip install --no-cache-dir -r requirements-model-api.txt; then
                echo "Initial pip install failed, rebuilding ML venv and retrying without cache..."
                deactivate || true
                rm -rf .venv_model_api
                python3 -m venv .venv_model_api
                source .venv_model_api/bin/activate
                python -m pip install --upgrade pip --no-cache-dir
                python -m pip install --no-cache-dir -r requirements-model-api.txt
              fi
              echo "Disk usage after ML setup:"
              df -h || true
              cd ../..
            fi

            if [[ "${SERVICE}" == "python-agents" || "${SERVICE}" == "all" ]]; then
              echo "Setting up Python agent gateway..."
              cd "Strong Seaweed/blue-weave-aqua-main/server/agents_python"
              if ! python3 -m venv .venv; then
                echo "python3-venv missing; installing prerequisites..."
                sudo apt-get update -y
                sudo apt-get install -y python3-venv python3-pip python3.12-venv || true
                python3 -m venv .venv
              fi
              source .venv/bin/activate
              pip install --upgrade pip
              pip install -r requirements.txt
              cd ../../../..
            fi

            if [[ "${SERVICE}" == "blueweave-backend" || "${SERVICE}" == "all" ]]; then
              echo "Setting up Node.js backend..."
              cd "Strong Seaweed/blue-weave-aqua-main/server"
              ENV_FILE=".env"
              if [[ ! -f "${ENV_FILE}" ]]; then
                echo "No ${ENV_FILE} found; creating from .env.example"
                if [[ -f ".env.example" ]]; then
                  cp ".env.example" "${ENV_FILE}"
                else
                  touch "${ENV_FILE}"
                fi
              fi

              upsert_env() {
                local key="$1"
                local value="$2"
                local file="$3"
                local tmp_file
                tmp_file="$(mktemp)"
                awk -v key="$key" -v value="$value" '
                  BEGIN { updated = 0 }
                  $0 ~ ("^" key "=") { print key "=" value; updated = 1; next }
                  { print }
                  END { if (!updated) print key "=" value }
                ' "$file" > "$tmp_file"
                mv "$tmp_file" "$file"
              }

              ensure_env_default() {
                local key="$1"
                local value="$2"
                local file="$3"
                if ! grep -q "^${key}=" "$file"; then
                  echo "${key}=${value}" >> "$file"
                fi
              }

              if [[ -n "${MONGODB_URI:-}" ]]; then
                upsert_env "MONGODB_URI" "${MONGODB_URI}" "${ENV_FILE}"
              elif ! grep -q "^MONGODB_URI=" "${ENV_FILE}"; then
                echo "Missing MONGODB_URI in both GitHub secret and ${ENV_FILE}."
                exit 1
              fi

              EFFECTIVE_CORS_ORIGINS="${CORS_ORIGINS:-https://akuara.publicvm.com,http://akuara.publicvm.com,http://127.0.0.1:8080,http://localhost:8080}"
              upsert_env "PORT" "4000" "${ENV_FILE}"
              upsert_env "CORS_ORIGINS" "${EFFECTIVE_CORS_ORIGINS}" "${ENV_FILE}"
              if [[ -n "${JWT_SECRET:-}" ]]; then
                upsert_env "JWT_SECRET" "${JWT_SECRET}" "${ENV_FILE}"
              fi
              ensure_env_default "MODEL_API_URL" "http://127.0.0.1:8000" "${ENV_FILE}"
              ensure_env_default "AI_TIMEOUT_MS" "12000" "${ENV_FILE}"
              ensure_env_default "AI_ROUTER_MODE" "hybrid" "${ENV_FILE}"
              ensure_env_default "VOICE_TTS_PROVIDER" "browser" "${ENV_FILE}"
              ensure_env_default "LANGCHAIN_API_URL" "http://127.0.0.1:8101" "${ENV_FILE}"
              ensure_env_default "LANGGRAPH_API_URL" "http://127.0.0.1:8101" "${ENV_FILE}"
              ensure_env_default "CREWAI_API_URL" "http://127.0.0.1:8101" "${ENV_FILE}"
              ensure_env_default "ELEVENLABS_MODEL_ID" "eleven_multilingual_v2" "${ENV_FILE}"
              ensure_env_default "ELEVENLABS_OUTPUT_FORMAT" "mp3_44100_128" "${ENV_FILE}"
              ensure_env_default "ELEVENLABS_STRICT_VOICE" "false" "${ENV_FILE}"
              ensure_env_default "ELEVENLABS_API_KEY" "" "${ENV_FILE}"
              ensure_env_default "ELEVENLABS_VOICE_ID_FEMALE" "" "${ENV_FILE}"
              ensure_env_default "ELEVENLABS_VOICE_ID" "" "${ENV_FILE}"
              echo "Preserved server-managed ${ENV_FILE}; provider keys are not overwritten by deploy."
              if ! command -v npm >/dev/null 2>&1; then
                echo "npm not found; installing Node.js 20..."
                sudo apt-get update -y
                sudo apt-get install -y ca-certificates curl gnupg
                sudo mkdir -p /etc/apt/keyrings
                curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
                echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" | sudo tee /etc/apt/sources.list.d/nodesource.list >/dev/null
                sudo apt-get update -y
                sudo apt-get install -y nodejs
              fi
              npm ci --omit=dev || npm install --omit=dev --legacy-peer-deps
              cd ../../..
            fi

            # Ensure stable no-space alias path for systemd units.
            if [[ -d "${DEPLOY_ROOT}/Strong Seaweed" ]]; then
              ln -sfn "${DEPLOY_ROOT}/Strong Seaweed" "${HOME}/strongseaweed_root"
            else
              ln -sfn "${DEPLOY_ROOT}" "${HOME}/strongseaweed_root"
            fi

            if [[ "${SERVICE}" == "ml-apis" || "${SERVICE}" == "all" ]]; then
              echo "Provisioning akuara-model-api systemd unit..."
              if [[ -n "${MODEL_API_ENV_B64:-}" ]]; then
                echo "Writing /etc/default/akuara-model-api from MODEL_API_ENV_B64"
                printf '%s' "${MODEL_API_ENV_B64}" | base64 -d | sudo tee /etc/default/akuara-model-api >/dev/null
              else
                echo "MODEL_API_ENV_B64 not set; ensuring baseline /etc/default/akuara-model-api defaults"
                sudo touch /etc/default/akuara-model-api
                sudo grep -q '^TIE_GAP_PERCENT=' /etc/default/akuara-model-api || echo 'TIE_GAP_PERCENT=1.0' | sudo tee -a /etc/default/akuara-model-api >/dev/null
                sudo grep -q '^RANK_WEIGHT_PROB=' /etc/default/akuara-model-api || echo 'RANK_WEIGHT_PROB=0.70' | sudo tee -a /etc/default/akuara-model-api >/dev/null
                sudo grep -q '^RANK_WEIGHT_MARGIN=' /etc/default/akuara-model-api || echo 'RANK_WEIGHT_MARGIN=0.20' | sudo tee -a /etc/default/akuara-model-api >/dev/null
                sudo grep -q '^RANK_WEIGHT_ENV=' /etc/default/akuara-model-api || echo 'RANK_WEIGHT_ENV=0.10' | sudo tee -a /etc/default/akuara-model-api >/dev/null
                sudo grep -q '^TIE_FORCE_PILOT_ONLY=' /etc/default/akuara-model-api || echo 'TIE_FORCE_PILOT_ONLY=true' | sudo tee -a /etc/default/akuara-model-api >/dev/null
              fi
              {
                echo "[Unit]"
                echo "Description=Akuara Species Model API"
                echo "After=network.target"
                echo ""
                echo "[Service]"
                echo "Type=simple"
                echo "User=ubuntu"
                echo "WorkingDirectory=/home/ubuntu/strongseaweed_root/Strong-Seaweed-main"
                echo "EnvironmentFile=-/etc/default/akuara-model-api"
                echo "ExecStart=/home/ubuntu/strongseaweed_root/Strong-Seaweed-main/.venv_model_api/bin/python /home/ubuntu/strongseaweed_root/Strong-Seaweed-main/serve_species_api.py"
                echo "Restart=always"
                echo "RestartSec=3"
                echo "StandardOutput=append:/home/ubuntu/model_api.log"
                echo "StandardError=append:/home/ubuntu/model_api.err.log"
                echo ""
                echo "[Install]"
                echo "WantedBy=multi-user.target"
              } | sudo tee /etc/systemd/system/akuara-model-api.service >/dev/null
            fi

            if [[ "${SERVICE}" == "blueweave-backend" || "${SERVICE}" == "all" ]]; then
              echo "Provisioning akuara-backend systemd unit..."
              {
                echo "[Unit]"
                echo "Description=Akuara Node Backend"
                echo "After=network.target"
                echo ""
                echo "[Service]"
                echo "Type=simple"
                echo "User=ubuntu"
                echo "WorkingDirectory=/home/ubuntu/strongseaweed_root/blue-weave-aqua-main/server"
                echo "Environment=NODE_ENV=production"
                echo "ExecStart=/usr/bin/npm start"
                echo "Restart=always"
                echo "RestartSec=3"
                echo "StandardOutput=append:/home/ubuntu/backend.log"
                echo "StandardError=append:/home/ubuntu/backend.err.log"
                echo ""
                echo "[Install]"
                echo "WantedBy=multi-user.target"
              } | sudo tee /etc/systemd/system/akuara-backend.service >/dev/null
            fi

            sudo systemctl daemon-reload
            if [[ "${SERVICE}" == "ml-apis" || "${SERVICE}" == "all" ]]; then
              sudo systemctl enable akuara-model-api || true
            fi
            if [[ "${SERVICE}" == "blueweave-backend" || "${SERVICE}" == "all" ]]; then
              sudo systemctl enable akuara-backend || true
            fi

            if [[ "${SERVICE}" == "blueweave-frontend" || "${SERVICE}" == "all" ]]; then
              echo "Deploying prebuilt frontend artifact..."
              cd "Strong Seaweed/blue-weave-aqua-main"
              if [[ ! -f /tmp/blueweave-dist.tgz ]]; then
                echo "Missing /tmp/blueweave-dist.tgz on server"
                exit 1
              fi
              rm -rf dist
              tar -xzf /tmp/blueweave-dist.tgz -C .
              test -f dist/index.html || { echo "Frontend artifact missing dist/index.html"; exit 1; }
              ls -lah dist | sed -n '1,40p'
              echo "Syncing frontend dist to live nginx root (/var/www/blueweave)..."
              sudo mkdir -p /var/www/blueweave
              if command -v rsync >/dev/null 2>&1; then
                sudo rsync -a --delete dist/ /var/www/blueweave/
              else
                sudo rm -rf /var/www/blueweave/*
                sudo cp -a dist/. /var/www/blueweave/
              fi
              sudo chown -R www-data:www-data /var/www/blueweave
              sudo find /var/www/blueweave -type d -exec chmod 755 {} \;
              sudo find /var/www/blueweave -type f -exec chmod 644 {} \;
              echo "Frontend checksums (source -> live):"
              sha256sum dist/index.html || true
              sha256sum /var/www/blueweave/index.html || true
              cd ../..
              echo "Fixing frontend file permissions for nginx..."
              sudo chmod o+rx /home/ubuntu || true
              sudo chmod o+rx "${DEPLOY_ROOT}" || true
              sudo chmod o+rx "${DEPLOY_ROOT}/Strong Seaweed" || true
              sudo chmod o+rx "${DEPLOY_ROOT}/Strong Seaweed/blue-weave-aqua-main" || true
              sudo chmod -R o+rX "${DEPLOY_ROOT}/Strong Seaweed/blue-weave-aqua-main/dist" || true
            fi

            echo "Deployment complete."
          EOF

      - name: Restart services
        if: ${{ github.event_name == 'push' || github.event.inputs.restart == 'true' }}
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          SERVICE: ${{ (github.event_name == 'push' && 'all') || github.event.inputs.service || 'all' }}
        run: |
          ssh -i ~/.ssh/deploy_key "${AWS_USER}@${AWS_HOST}" "SERVICE='${SERVICE}' bash -s" << 'EOF'
            echo "Restarting services..."

            if [[ "${SERVICE}" == "ml-apis" || "${SERVICE}" == "all" ]]; then
              sudo systemctl restart akuara-model-api || echo "akuara-model-api service not configured yet"
              sudo systemctl --no-pager -l status akuara-model-api || true
            fi

            if [[ "${SERVICE}" == "python-agents" || "${SERVICE}" == "all" ]]; then
              sudo systemctl restart python-agents || echo "python-agents service not configured yet"
            fi

            if [[ "${SERVICE}" == "blueweave-backend" || "${SERVICE}" == "all" ]]; then
              sudo systemctl restart akuara-backend || echo "akuara-backend service not configured yet"
              sudo systemctl --no-pager -l status akuara-backend || true
            fi

            if [[ "${SERVICE}" == "blueweave-frontend" || "${SERVICE}" == "all" ]]; then
              if systemctl list-unit-files | grep -q '^nginx\.service'; then
                sudo systemctl reload nginx || true
              else
                echo "nginx service not configured; skipping reload"
              fi
            fi
          EOF

      - name: Health check
        if: ${{ github.event_name == 'push' || github.event.inputs.restart == 'true' }}
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          SERVICE: ${{ (github.event_name == 'push' && 'all') || github.event.inputs.service || 'all' }}
          FRONTEND_HOST: ${{ vars.FRONTEND_HOST }}
        run: |
          echo "Running health check..."
          EFFECTIVE_FRONTEND_HOST="${FRONTEND_HOST:-akuara.publicvm.com}"
          ssh -i ~/.ssh/deploy_key "${AWS_USER}@${AWS_HOST}" "SERVICE='${SERVICE}' FRONTEND_HOST='${EFFECTIVE_FRONTEND_HOST}' bash -s" << 'EOF'
            set -e
            wait_for_url() {
              local url="$1"
              local attempts="${2:-36}"
              local sleep_s="${3:-5}"
              local i=1
              while [[ $i -le $attempts ]]; do
                if curl -fsS "$url" >/dev/null 2>&1; then
                  echo "Healthy: $url"
                  return 0
                fi
                echo "Waiting for $url ($i/$attempts)..."
                sleep "$sleep_s"
                i=$((i + 1))
              done
              return 1
            }

            if [[ "${SERVICE}" == "ml-apis" || "${SERVICE}" == "all" ]]; then
              wait_for_url "http://127.0.0.1:8000/health" 36 5 || {
                echo "Model API health check failed. Service diagnostics:"
                sudo systemctl --no-pager -l status akuara-model-api || true
                sudo journalctl -u akuara-model-api -n 120 --no-pager -l || true
                exit 1
              }
              curl -fsS http://127.0.0.1:8000/health
            fi
            if [[ "${SERVICE}" == "python-agents" || "${SERVICE}" == "all" ]]; then
              curl -fsS http://127.0.0.1:8101/health || true
            fi
            if [[ "${SERVICE}" == "blueweave-backend" || "${SERVICE}" == "all" ]]; then
              wait_for_url "http://127.0.0.1:4000/api/health" 24 3 || {
                echo "Backend health check failed. Service diagnostics:"
                sudo systemctl --no-pager -l status akuara-backend || true
                sudo journalctl -u akuara-backend -n 120 --no-pager -l || true
                exit 1
              }
              curl -fsS http://127.0.0.1:4000/api/health
            fi
            if [[ "${SERVICE}" == "blueweave-frontend" || "${SERVICE}" == "all" ]]; then
              if systemctl list-unit-files | grep -q '^nginx\.service'; then
                # Probe nginx with the production host header to avoid default-vhost 404 on localhost.
                curl -fsSI --max-time 5 -H "Host: ${FRONTEND_HOST}" http://127.0.0.1/ | head -n 1 || {
                  echo "nginx localhost check failed for host ${FRONTEND_HOST}"
                  exit 1
                }
              else
                echo "nginx service not configured; skipping localhost:80 check"
              fi
              test -f /var/www/blueweave/index.html
            fi
          EOF

      - name: Post-deploy live benchmark gate
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'ml-apis' || github.event.inputs.service == 'all' }}
        env:
          EVAL_EMAIL: ${{ secrets.EVAL_EMAIL }}
          EVAL_PASSWORD: ${{ secrets.EVAL_PASSWORD }}
          EVAL_BASE_HOST: ${{ vars.FRONTEND_HOST }}
        run: |
          set -euo pipefail
          if [[ -z "${EVAL_EMAIL:-}" || -z "${EVAL_PASSWORD:-}" ]]; then
            echo "::warning::Skipping live benchmark gate: missing EVAL_EMAIL or EVAL_PASSWORD"
            exit 0
          fi
          BASE_HOST="${EVAL_BASE_HOST:-akuara.publicvm.com}"
          python -m pip install --upgrade pip
          python -m pip install requests
          python "Strong Seaweed/Strong-Seaweed-main/evaluate_live_system.py" \
            --base_host "${BASE_HOST}" \
            --email "${EVAL_EMAIL}" \
            --password "${EVAL_PASSWORD}" \
            --out_json "$RUNNER_TEMP/live_system_eval.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          path = Path(os.environ["RUNNER_TEMP"]) / "live_system_eval.json"
          out = json.loads(path.read_text(encoding="utf-8"))
          m = out.get("metrics", {})
          checks = {
            "coverage_rate": float(m.get("coverage_rate", 0.0)) >= 0.95,
            "top1_agreement_external": float(m.get("top1_agreement_external", 0.0)) >= 0.80,
            "high_conf_mismatch_rate": float(m.get("high_conf_mismatch_rate", 1.0)) <= 0.05,
            "tie_rate": float(m.get("tie_rate", 1.0)) <= 0.10,
            "recommended_when_tie_rate": float(m.get("recommended_when_tie_rate", 1.0)) <= 0.02,
          }
          failed = [k for k, ok in checks.items() if not ok]
          print("Benchmark metrics:", json.dumps(m, indent=2))
          if failed:
            raise SystemExit(f"Benchmark gate failed: {', '.join(failed)}")
          PY
