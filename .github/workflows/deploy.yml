name: CD Deploy to AWS
 
on:
  push:
    branches: [beta]
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to deploy"
        required: true
        type: choice
        options:
          - ml-apis
          - blueweave-backend
          - blueweave-frontend
          - python-agents
          - all
      restart:
        description: "Restart service after deployment"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: cd-deploy-beta
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js (frontend artifact build)
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'blueweave-frontend' || github.event.inputs.service == 'all' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend artifact on runner
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'blueweave-frontend' || github.event.inputs.service == 'all' }}
        run: |
          cd "Strong Seaweed/blue-weave-aqua-main"
          if [[ -f package-lock.json ]]; then
            npm ci || npm install --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi
          npm run build
          test -f dist/index.html
          tar -czf "$RUNNER_TEMP/blueweave-dist.tgz" -C . dist

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.AWS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload frontend artifact to server
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'blueweave-frontend' || github.event.inputs.service == 'all' }}
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
        run: |
          echo "Uploading frontend artifact to ${AWS_USER}@${AWS_HOST}:/tmp/blueweave-dist.tgz"
          scp -i ~/.ssh/deploy_key "$RUNNER_TEMP/blueweave-dist.tgz" "${AWS_USER}@${AWS_HOST}:/tmp/blueweave-dist.tgz"
          ssh -i ~/.ssh/deploy_key "${AWS_USER}@${AWS_HOST}" "ls -lh /tmp/blueweave-dist.tgz"

      - name: Deploy code to AWS
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SERVICE: ${{ (github.event_name == 'push' && 'all') || github.event.inputs.service || 'all' }}
        run: |
          ssh -i ~/.ssh/deploy_key "${AWS_USER}@${AWS_HOST}" "DEPLOY_PATH='${DEPLOY_PATH}' SERVICE='${SERVICE}' bash -s" << 'EOF'
            set -euo pipefail
            DEPLOY_ROOT="${DEPLOY_PATH:-}"
            if [[ -z "${DEPLOY_ROOT}" || ! -d "${DEPLOY_ROOT}" ]]; then
              for c in \
                "${HOME}/strongseaweed" \
                "${HOME}/Strong Seaweed/Strong Seaweed" \
                "${HOME}/Strong-Seaweed" \
                "${HOME}/Strong Seaweed"; do
                if [[ -d "${c}" ]]; then
                  DEPLOY_ROOT="${c}"
                  break
                fi
              done
            fi
            if [[ -z "${DEPLOY_ROOT}" || ! -d "${DEPLOY_ROOT}" ]]; then
              echo "Could not resolve deployment root. DEPLOY_PATH='${DEPLOY_PATH}'"
              exit 1
            fi

            cd "${DEPLOY_ROOT}"
            echo "Using deployment root: ${DEPLOY_ROOT}"

            echo "Pulling latest code from beta branch..."
            git fetch origin beta
            git checkout beta || git checkout -b beta origin/beta
            git reset --hard origin/beta

            if [[ "${SERVICE}" == "ml-apis" || "${SERVICE}" == "all" ]]; then
              echo "Setting up ML backend Python environment..."
              cd "Strong Seaweed/Strong-Seaweed-main"
              if ! python3 -m venv .venv_model_api; then
                echo "python3-venv missing; installing prerequisites..."
                sudo apt-get update -y
                sudo apt-get install -y python3-venv python3-pip python3.12-venv || true
                python3 -m venv .venv_model_api
              fi
              source .venv_model_api/bin/activate
              python -m pip install --upgrade pip
              python -m pip install -r requirements-model-api.txt
              cd ../..
            fi

            if [[ "${SERVICE}" == "python-agents" || "${SERVICE}" == "all" ]]; then
              echo "Setting up Python agent gateway..."
              cd "Strong Seaweed/blue-weave-aqua-main/server/agents_python"
              if ! python3 -m venv .venv; then
                echo "python3-venv missing; installing prerequisites..."
                sudo apt-get update -y
                sudo apt-get install -y python3-venv python3-pip python3.12-venv || true
                python3 -m venv .venv
              fi
              source .venv/bin/activate
              pip install --upgrade pip
              pip install -r requirements.txt
              cd ../../../..
            fi

            if [[ "${SERVICE}" == "blueweave-backend" || "${SERVICE}" == "all" ]]; then
              echo "Setting up Node.js backend..."
              cd "Strong Seaweed/blue-weave-aqua-main/server"
              if ! command -v npm >/dev/null 2>&1; then
                echo "npm not found; installing Node.js 20..."
                sudo apt-get update -y
                sudo apt-get install -y ca-certificates curl gnupg
                sudo mkdir -p /etc/apt/keyrings
                curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
                echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" | sudo tee /etc/apt/sources.list.d/nodesource.list >/dev/null
                sudo apt-get update -y
                sudo apt-get install -y nodejs
              fi
              npm ci --omit=dev || npm install --omit=dev --legacy-peer-deps
              cd ../../..
            fi

            # Ensure stable no-space alias path for systemd units.
            if [[ -d "${DEPLOY_ROOT}/Strong Seaweed" ]]; then
              ln -sfn "${DEPLOY_ROOT}/Strong Seaweed" "${HOME}/strongseaweed_root"
            else
              ln -sfn "${DEPLOY_ROOT}" "${HOME}/strongseaweed_root"
            fi

            if [[ "${SERVICE}" == "ml-apis" || "${SERVICE}" == "all" ]]; then
              echo "Provisioning akuara-model-api systemd unit..."
              {
                echo "[Unit]"
                echo "Description=Akuara Species Model API"
                echo "After=network.target"
                echo ""
                echo "[Service]"
                echo "Type=simple"
                echo "User=ubuntu"
                echo "WorkingDirectory=/home/ubuntu/strongseaweed_root/Strong-Seaweed-main"
                echo "ExecStart=/home/ubuntu/strongseaweed_root/Strong-Seaweed-main/.venv_model_api/bin/python /home/ubuntu/strongseaweed_root/Strong-Seaweed-main/serve_species_api.py"
                echo "Restart=always"
                echo "RestartSec=3"
                echo "StandardOutput=append:/home/ubuntu/model_api.log"
                echo "StandardError=append:/home/ubuntu/model_api.err.log"
                echo ""
                echo "[Install]"
                echo "WantedBy=multi-user.target"
              } | sudo tee /etc/systemd/system/akuara-model-api.service >/dev/null
            fi

            if [[ "${SERVICE}" == "blueweave-backend" || "${SERVICE}" == "all" ]]; then
              echo "Provisioning akuara-backend systemd unit..."
              {
                echo "[Unit]"
                echo "Description=Akuara Node Backend"
                echo "After=network.target"
                echo ""
                echo "[Service]"
                echo "Type=simple"
                echo "User=ubuntu"
                echo "WorkingDirectory=/home/ubuntu/strongseaweed_root/blue-weave-aqua-main/server"
                echo "Environment=NODE_ENV=production"
                echo "ExecStart=/usr/bin/npm start"
                echo "Restart=always"
                echo "RestartSec=3"
                echo "StandardOutput=append:/home/ubuntu/backend.log"
                echo "StandardError=append:/home/ubuntu/backend.err.log"
                echo ""
                echo "[Install]"
                echo "WantedBy=multi-user.target"
              } | sudo tee /etc/systemd/system/akuara-backend.service >/dev/null
            fi

            sudo systemctl daemon-reload
            if [[ "${SERVICE}" == "ml-apis" || "${SERVICE}" == "all" ]]; then
              sudo systemctl enable akuara-model-api || true
            fi
            if [[ "${SERVICE}" == "blueweave-backend" || "${SERVICE}" == "all" ]]; then
              sudo systemctl enable akuara-backend || true
            fi

            if [[ "${SERVICE}" == "blueweave-frontend" || "${SERVICE}" == "all" ]]; then
              echo "Deploying prebuilt frontend artifact..."
              cd "Strong Seaweed/blue-weave-aqua-main"
              if [[ ! -f /tmp/blueweave-dist.tgz ]]; then
                echo "Missing /tmp/blueweave-dist.tgz on server"
                exit 1
              fi
              rm -rf dist
              tar -xzf /tmp/blueweave-dist.tgz -C .
              test -f dist/index.html || { echo "Frontend artifact missing dist/index.html"; exit 1; }
              ls -lah dist | sed -n '1,40p'
              echo "Syncing frontend dist to live nginx root (/var/www/blueweave)..."
              sudo mkdir -p /var/www/blueweave
              if command -v rsync >/dev/null 2>&1; then
                sudo rsync -a --delete dist/ /var/www/blueweave/
              else
                sudo rm -rf /var/www/blueweave/*
                sudo cp -a dist/. /var/www/blueweave/
              fi
              sudo chown -R www-data:www-data /var/www/blueweave
              sudo find /var/www/blueweave -type d -exec chmod 755 {} \;
              sudo find /var/www/blueweave -type f -exec chmod 644 {} \;
              echo "Frontend checksums (source -> live):"
              sha256sum dist/index.html || true
              sha256sum /var/www/blueweave/index.html || true
              cd ../..
              echo "Fixing frontend file permissions for nginx..."
              sudo chmod o+rx /home/ubuntu || true
              sudo chmod o+rx "${DEPLOY_ROOT}" || true
              sudo chmod o+rx "${DEPLOY_ROOT}/Strong Seaweed" || true
              sudo chmod o+rx "${DEPLOY_ROOT}/Strong Seaweed/blue-weave-aqua-main" || true
              sudo chmod -R o+rX "${DEPLOY_ROOT}/Strong Seaweed/blue-weave-aqua-main/dist" || true
            fi

            echo "Deployment complete."
          EOF

      - name: Restart services
        if: ${{ github.event_name == 'push' || github.event.inputs.restart == 'true' }}
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          SERVICE: ${{ (github.event_name == 'push' && 'all') || github.event.inputs.service || 'all' }}
        run: |
          ssh -i ~/.ssh/deploy_key "${AWS_USER}@${AWS_HOST}" "SERVICE='${SERVICE}' bash -s" << 'EOF'
            echo "Restarting services..."

            if [[ "${SERVICE}" == "ml-apis" || "${SERVICE}" == "all" ]]; then
              sudo systemctl restart akuara-model-api || echo "akuara-model-api service not configured yet"
            fi

            if [[ "${SERVICE}" == "python-agents" || "${SERVICE}" == "all" ]]; then
              sudo systemctl restart python-agents || echo "python-agents service not configured yet"
            fi

            if [[ "${SERVICE}" == "blueweave-backend" || "${SERVICE}" == "all" ]]; then
              sudo systemctl restart akuara-backend || echo "akuara-backend service not configured yet"
            fi

            if [[ "${SERVICE}" == "blueweave-frontend" || "${SERVICE}" == "all" ]]; then
              if systemctl list-unit-files | grep -q '^nginx\.service'; then
                sudo systemctl reload nginx || true
              else
                echo "nginx service not configured; skipping reload"
              fi
            fi
          EOF

      - name: Health check
        if: ${{ github.event_name == 'push' || github.event.inputs.restart == 'true' }}
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          SERVICE: ${{ (github.event_name == 'push' && 'all') || github.event.inputs.service || 'all' }}
        run: |
          echo "Running health check..."
          sleep 5
          ssh -i ~/.ssh/deploy_key "${AWS_USER}@${AWS_HOST}" "SERVICE='${SERVICE}' bash -s" << 'EOF'
            set -e
            if [[ "${SERVICE}" == "ml-apis" || "${SERVICE}" == "all" ]]; then
              curl -fsS http://127.0.0.1:8000/health
            fi
            if [[ "${SERVICE}" == "python-agents" || "${SERVICE}" == "all" ]]; then
              curl -fsS http://127.0.0.1:8101/health || true
            fi
            if [[ "${SERVICE}" == "blueweave-backend" || "${SERVICE}" == "all" ]]; then
              curl -fsS http://127.0.0.1:4000/api/health || true
            fi
            if [[ "${SERVICE}" == "blueweave-frontend" || "${SERVICE}" == "all" ]]; then
              if systemctl list-unit-files | grep -q '^nginx\.service'; then
                curl -fsSI http://127.0.0.1/ | head -n 1
              else
                echo "nginx service not configured; skipping localhost:80 check"
              fi
              test -f /var/www/blueweave/index.html
            fi
          EOF
