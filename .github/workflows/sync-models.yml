name: Sync Models to AWS

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to sync (example: v1.1r_base46_cmp)"
        required: true
        type: string
      branch:
        description: "Which branch to sync from"
        required: true
        type: choice
        default: beta
        options:
          - beta
          - main

permissions:
  contents: read

jobs:
  sync-models:
    name: Upload Models to AWS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ github.event.inputs.branch }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.AWS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync model files via rsync
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          echo "Syncing release: ${RELEASE_TAG}"

          if [ ! -d "Strong Seaweed/Strong-Seaweed-main/releases/${RELEASE_TAG}" ]; then
            echo "Release ${RELEASE_TAG} not found locally"
            exit 1
          fi

          rsync -avz --progress \
            -e "ssh -i ~/.ssh/deploy_key" \
            "Strong Seaweed/Strong-Seaweed-main/releases/${RELEASE_TAG}/" \
            "${AWS_USER}@${AWS_HOST}:${DEPLOY_PATH}/Strong Seaweed/Strong-Seaweed-main/releases/${RELEASE_TAG}/"

          echo "Model sync complete"

      - name: Sync required data files
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          echo "Syncing essential data files..."

          rsync -avz --progress \
            -e "ssh -i ~/.ssh/deploy_key" \
            --include='india_physics_2025w01.nc' \
            --include='india_waves_2025w01.nc' \
            --exclude='*' \
            "Strong Seaweed/Strong-Seaweed-main/data/netcdf/" \
            "${AWS_USER}@${AWS_HOST}:${DEPLOY_PATH}/Strong Seaweed/Strong-Seaweed-main/data/netcdf/" || true

          rsync -avz --progress \
            -e "ssh -i ~/.ssh/deploy_key" \
            --include='master_feature_matrix_v1_1_augmented.csv' \
            --include='master_feature_matrix_kappa_india_gulf_v2_hardmerge4_augmented.csv' \
            --exclude='*' \
            "Strong Seaweed/Strong-Seaweed-main/data/tabular/" \
            "${AWS_USER}@${AWS_HOST}:${DEPLOY_PATH}/Strong Seaweed/Strong-Seaweed-main/data/tabular/" || true

          echo "Data sync complete"

      - name: Verify deployment
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          ssh -i ~/.ssh/deploy_key "${AWS_USER}@${AWS_HOST}" "DEPLOY_PATH='${DEPLOY_PATH}' RELEASE_TAG='${RELEASE_TAG}' bash -s" << 'EOF'
            set -e
            cd "${DEPLOY_PATH}/Strong Seaweed/Strong-Seaweed-main"
            echo "Verifying release files..."
            if [ -d "releases/${RELEASE_TAG}" ]; then
              echo "Release ${RELEASE_TAG} found"
              ls -lh "releases/${RELEASE_TAG}/models/" | head -10
            else
              echo "Release ${RELEASE_TAG} not found"
              exit 1
            fi
          EOF
